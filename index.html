<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Marbles CBT - Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="video-bg">
    <video autoplay muted loop>
      <source src="https://assets.mixkit.co/videos/preview/mixkit-white-abstract-technology-background-34420-large.mp4" type="video/mp4">
    </video>
  </div>
  
  <div class="overlay">
    <div class="logo">Green Marbles CBT</div>
    <div class="container">
      <h2>Student Registration</h2>
      <form id="registerForm">
        <div class="form-group">
          <input type="text" id="fullName" placeholder="Full Name" required>
        </div>
        <div class="form-group">
          <input type="email" id="email" placeholder="Email Address" required>
        </div>
        <div class="form-group">
          <input type="tel" id="phone" placeholder="Phone Number" required>
        </div>
        <div class="form-group">
          <input type="date" id="dob" required>
        </div>
        <div class="form-group">
          <select id="department" required>
            <option value="">Select Department</option>
            <option value="Science">Science</option>
            <option value="Art">Art</option>
            <option value="Commercial">Commercial</option>
          </select>
        </div>
        <div class="form-group">
          <input type="password" id="password" placeholder="Password" required>
        </div>
        <div class="form-group">
          <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        </div>
        <button type="submit">Register</button>
      </form>
      <div class="link">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        fullName: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        dob: document.getElementById('dob').value,
        department: document.getElementById('department').value,
        password: document.getElementById('password').value,
        confirmPassword: document.getElementById('confirmPassword').value
      };

      try {
        const res = await fetch(API_URL + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (res.ok) {
          localStorage.setItem('token', result.token);
          localStorage.setItem('student', JSON.stringify(result.student));
          showToast('Registration Successful!', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 1500);
        } else {
          showToast(result.msg || 'Error occurred', 'error');
        }
      } catch (err) {
        showToast('Network Error', 'error');
      }
    });
  </script>
</body>
</html>
